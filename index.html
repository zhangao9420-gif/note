<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1117; color: #e1e4e8; display: flex; height: 100vh; overflow: hidden;
}
a { color: #58a6ff; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px; background: #161b22; border-right: 1px solid #30363d;
  display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto;
}
#sidebar h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
#search { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d;
  background: #0d1117; color: #e1e4e8; font-size: 14px; outline: none; }
#search:focus { border-color: #58a6ff; }
#categories, #tags-cloud { display: flex; flex-wrap: wrap; gap: 4px; }
.cat-chip, .tag-chip {
  padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
  border: 1px solid #30363d; background: #21262d; color: #c9d1d9; white-space: nowrap;
}
.cat-chip:hover, .tag-chip:hover { background: #30363d; }
.cat-chip.active, .tag-chip.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#btn-new {
  width: 100%; padding: 10px; border-radius: 6px; border: none; cursor: pointer;
  background: #238636; color: #fff; font-size: 14px; font-weight: 600; margin-top: auto;
}
#btn-new:hover { background: #2ea043; }

/* Note list */
#list-panel {
  width: 300px; min-width: 240px; background: #0d1117; border-right: 1px solid #30363d;
  display: flex; flex-direction: column; overflow: hidden;
}
#note-list { flex: 1; overflow-y: auto; }
.note-item {
  padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #21262d;
  transition: background 0.1s;
}
.note-item:hover { background: #161b22; }
.note-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
.note-item .ni-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item .ni-meta { font-size: 11px; color: #8b949e; display: flex; gap: 8px; }
.note-item .ni-date { white-space: nowrap; }
#list-empty { padding: 40px 16px; text-align: center; color: #8b949e; font-size: 14px; }

/* Editor */
#editor {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 24px; gap: 12px;
}
#editor.empty { justify-content: center; align-items: center; color: #8b949e; }
#note-title {
  font-size: 24px; font-weight: 700; background: transparent; border: none; color: #e1e4e8;
  outline: none; padding: 4px 0; border-bottom: 1px solid transparent;
}
#note-title:focus { border-bottom-color: #30363d; }
#note-title::placeholder { color: #484f58; }
#editor-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#editor-meta input {
  padding: 6px 10px; border-radius: 6px; border: 1px solid #30363d;
  background: #0d1117; color: #e1e4e8; font-size: 13px; outline: none;
}
#editor-meta input:focus { border-color: #58a6ff; }
#cat-input { width: 120px; }
#tag-input { width: 160px; }
#editor-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.editor-tag {
  padding: 2px 8px; border-radius: 12px; font-size: 12px; background: #21262d;
  display: flex; align-items: center; gap: 4px;
}
.editor-tag button { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.editor-tag button:hover { color: #f85149; }
#editor-body-wrap { flex: 1; display: flex; gap: 0; overflow: hidden; border: 1px solid #30363d; border-radius: 6px; }
#note-body {
  flex: 1; resize: none; border: none; background: #0d1117; color: #e1e4e8;
  font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; line-height: 1.6;
  padding: 16px; outline: none; border-radius: 6px 0 0 6px;
}
#preview {
  flex: 1; padding: 16px; overflow-y: auto; background: #0d1117; display: none;
  border-radius: 0 6px 6px 0; border-left: 1px solid #30363d;
}
#preview.visible { display: block; }
#preview h1, #preview h2, #preview h3 { margin: 16px 0 8px; }
#preview p { margin: 8px 0; }
#preview code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
#preview pre { background: #161b22; padding: 12px; border-radius: 6px; overflow-x: auto; }
#preview pre code { padding: 0; background: none; }
#preview ul, #preview ol { padding-left: 20px; margin: 8px 0; }
#preview blockquote { border-left: 3px solid #58a6ff; padding-left: 12px; color: #8b949e; margin: 8px 0; }

/* Editor actions */
#editor-actions { display: flex; gap: 8px; align-items: center; }
#editor-actions button {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d; cursor: pointer;
  background: #21262d; color: #c9d1d9; font-size: 13px;
}
#editor-actions button:hover { background: #30363d; }
#btn-toggle-preview { margin-right: auto; }
#btn-delete { border-color: #da3633; color: #f85149; }
#btn-delete:hover { background: #490202; }
#status { font-size: 12px; color: #8b949e; margin-left: 8px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Notes</h2>
  <input id="search" type="text" placeholder="搜索笔记...">
  <div id="categories"></div>
  <div id="tags-cloud"></div>
  <button id="btn-new">+ 新建笔记</button>
</div>

<div id="list-panel">
  <div id="note-list"></div>
</div>

<div id="editor" class="empty">
  <p id="editor-placeholder">选择或创建一条笔记</p>
  <div id="editor-content" class="hidden" style="display:flex;flex-direction:column;flex:1;gap:12px;width:100%">
    <input id="note-title" type="text" placeholder="标题">
    <div id="editor-meta">
      <input id="cat-input" type="text" placeholder="分类">
      <input id="tag-input" type="text" placeholder="添加标签 (回车)">
      <div id="editor-tags"></div>
    </div>
    <div id="editor-body-wrap">
      <textarea id="note-body" placeholder="笔记内容 (Markdown)"></textarea>
      <div id="preview"></div>
    </div>
    <div id="editor-actions">
      <button id="btn-toggle-preview">预览</button>
      <button id="btn-save">保存</button>
      <button id="btn-delete">删除</button>
      <span id="status"></span>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uukcsuitcfsdumuooape.supabase.co';
const SUPABASE_KEY = 'sb_publishable__Yn8UcX3ZddZ9mH9ptv72A_Hmdp6LnL';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let notes = [], currentNote = null, selectedCategory = '', selectedTag = '', searchQuery = '';
let previewVisible = false, editorTags = [];

// --- DOM refs ---
const $search = document.getElementById('search');
const $categories = document.getElementById('categories');
const $tagsCloud = document.getElementById('tags-cloud');
const $noteList = document.getElementById('note-list');
const $editor = document.getElementById('editor');
const $editorPlaceholder = document.getElementById('editor-placeholder');
const $editorContent = document.getElementById('editor-content');
const $noteTitle = document.getElementById('note-title');
const $noteBody = document.getElementById('note-body');
const $preview = document.getElementById('preview');
const $catInput = document.getElementById('cat-input');
const $tagInput = document.getElementById('tag-input');
const $editorTags = document.getElementById('editor-tags');
const $status = document.getElementById('status');
const $btnTogglePreview = document.getElementById('btn-toggle-preview');

// --- Load ---
async function loadNotes() {
  const { data, error } = await sb.from('notes').select('*').order('updated_at', { ascending: false });
  if (!error) { notes = data; renderAll(); }
}

function renderAll() {
  renderSidebar();
  renderList();
  if (currentNote) {
    const fresh = notes.find(n => n.id === currentNote.id);
    renderEditor(fresh || currentNote);
    if (!fresh) { currentNote = null; renderEditor(null); }
  }
}

// --- Sidebar ---
function renderSidebar() {
  const cats = {}, tags = {};
  notes.forEach(n => {
    if (n.category) cats[n.category] = (cats[n.category] || 0) + 1;
    (n.tags || []).forEach(t => { if (t) tags[t] = (tags[t] || 0) + 1; });
  });
  $categories.innerHTML = Object.keys(cats).map(c =>
    `<span class="cat-chip${c === selectedCategory ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)} (${cats[c]})</span>`
  ).join('');
  $tagsCloud.innerHTML = Object.keys(tags).map(t =>
    `<span class="tag-chip${t === selectedTag ? ' active' : ''}" data-tag="${esc(t)}">${esc(t)} (${tags[t]})</span>`
  ).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- List ---
function renderList() {
  const filtered = notes.filter(n => {
    if (selectedCategory && n.category !== selectedCategory) return false;
    if (selectedTag && !(n.tags || []).includes(selectedTag)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!(n.title || '').toLowerCase().includes(q) && !(n.body || '').toLowerCase().includes(q) && !(n.category || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });
  if (filtered.length === 0) {
    $noteList.innerHTML = '<div id="list-empty">没有匹配的笔记</div>';
  } else {
    $noteList.innerHTML = filtered.map(n => `
      <div class="note-item${currentNote && currentNote.id === n.id ? ' active' : ''}" data-id="${n.id}">
        <div class="ni-title">${esc(n.title || '无标题')}</div>
        <div class="ni-meta">
          ${n.category ? `<span>${esc(n.category)}</span>` : ''}
          <span class="ni-date">${formatDate(n.updated_at)}</span>
        </div>
      </div>
    `).join('');
  }
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d), now = new Date();
  const diff = now - dt;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
  return dt.toLocaleDateString('zh-CN');
}

// --- Editor ---
function renderEditor(note) {
  if (!note) {
    $editor.classList.add('empty');
    $editorPlaceholder.style.display = '';
    $editorContent.classList.add('hidden');
    $editorContent.style.display = 'none';
    return;
  }
  $editor.classList.remove('empty');
  $editorPlaceholder.style.display = 'none';
  $editorContent.classList.remove('hidden');
  $editorContent.style.display = 'flex';
  $noteTitle.value = note.title || '';
  $noteBody.value = note.body || '';
  $catInput.value = note.category || '';
  editorTags = note.tags || [];
  renderEditorTags();
  updatePreview();
}

function renderEditorTags() {
  $editorTags.innerHTML = editorTags.map(t =>
    `<span class="editor-tag">${esc(t)}<button data-remove="${esc(t)}">&times;</button></span>`
  ).join('');
}

function updatePreview() {
  if (previewVisible) {
    $preview.innerHTML = marked.parse($noteBody.value || '');
  }
}

// --- Events ---
$search.addEventListener('input', () => { searchQuery = $search.value.trim(); renderList(); });

$categories.addEventListener('click', e => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  selectedCategory = chip.dataset.cat === selectedCategory ? '' : chip.dataset.cat;
  renderAll();
});

$tagsCloud.addEventListener('click', e => {
  const chip = e.target.closest('.tag-chip');
  if (!chip) return;
  selectedTag = chip.dataset.tag === selectedTag ? '' : chip.dataset.tag;
  renderAll();
});

$noteList.addEventListener('click', e => {
  const item = e.target.closest('.note-item');
  if (!item) return;
  const note = notes.find(n => n.id === item.dataset.id);
  if (note) { currentNote = note; renderEditor(note); renderList(); }
});

document.getElementById('btn-new').addEventListener('click', () => {
  currentNote = { id: null, title: '', body: '', category: '', tags: [], created_at: null, updated_at: null };
  renderEditor(currentNote);
  renderList();
  $noteTitle.focus();
});

$tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = $tagInput.value.trim();
    if (val && !editorTags.includes(val)) { editorTags.push(val); renderEditorTags(); }
    $tagInput.value = '';
  }
});

$editorTags.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  editorTags = editorTags.filter(t => t !== btn.dataset.remove);
  renderEditorTags();
});

$btnTogglePreview.addEventListener('click', () => {
  previewVisible = !previewVisible;
  $preview.classList.toggle('visible', previewVisible);
  $btnTogglePreview.textContent = previewVisible ? '编辑' : '预览';
  if (previewVisible) updatePreview();
});

$noteBody.addEventListener('input', updatePreview);

document.getElementById('btn-save').addEventListener('click', async () => {
  const note = {
    title: $noteTitle.value.trim(),
    body: $noteBody.value,
    category: $catInput.value.trim(),
    tags: editorTags,
    updated_at: new Date().toISOString()
  };
  if (!note.title && !note.body) { setStatus('标题和内容不能都为空'); return; }

  setStatus('保存中...');
  if (currentNote && currentNote.id) {
    const { error } = await sb.from('notes').update(note).eq('id', currentNote.id);
    if (error) { setStatus('保存失败: ' + error.message); return; }
  } else {
    note.created_at = new Date().toISOString();
    const { data, error } = await sb.from('notes').insert(note).select();
    if (error) { setStatus('保存失败: ' + error.message); return; }
    currentNote = data[0];
    notes.unshift(currentNote);
  }
  await loadNotes();
  renderEditor(currentNote);
  renderList();
  setStatus('已保存');
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  if (!currentNote || !currentNote.id) return;
  if (!confirm('确定删除 "' + (currentNote.title || '无标题') + '" ？')) return;
  setStatus('删除中...');
  await sb.from('notes').delete().eq('id', currentNote.id);
  currentNote = null;
  await loadNotes();
  renderEditor(null);
  setStatus('');
});

function setStatus(msg) { $status.textContent = msg; if (msg) setTimeout(() => { if ($status.textContent === msg) $status.textContent = ''; }, 3000); }

// --- Keyboard shortcuts ---
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); document.getElementById('btn-save').click(); }
});

loadNotes();
</script>
</body>
</html>
